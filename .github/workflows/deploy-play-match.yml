name: Deploy play-match Edge Function

# Deploys the authoritative match resolver to Supabase.
#
# One-time setup (all in a browser):
#   1. Supabase Dashboard → Account → Access Tokens → generate a token.
#   2. GitHub repo → Settings → Secrets and variables → Actions:
#        - SUPABASE_ACCESS_TOKEN = <the token>  (add as a Secret)
#        - SUPABASE_PROJECT_REF  = <your project ref>  (Variable OR Secret — either works)
#      (the project ref is the subdomain of your project URL / Project Settings → General.
#       It is not sensitive — it appears in your public VITE_SUPABASE_URL — so a Variable
#       is fine, but the deploy step below reads it from a Variable or a Secret.)
#
# It regenerates the self-contained bundle from source, then deploys, so the
# committed index.ts can never drift from the engine.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/functions/_src/**'
      - 'src/game/**'
      - 'src/lib/types.ts'
      - '.github/workflows/deploy-play-match.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Read the project ref from a repository Variable or Secret, whichever is set.
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Check required config
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF is empty. Add it under Settings → Secrets and variables → Actions (as a Variable or a Secret)."
            exit 1
          fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty. Add it as a repository Secret."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Rebuild the self-contained function bundle from the canonical engine source.
      - run: npm run build:function

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase functions deploy play-match --project-ref "$SUPABASE_PROJECT_REF"
