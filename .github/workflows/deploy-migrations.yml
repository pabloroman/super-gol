name: Apply Supabase migrations

# Applies pending database migrations to the linked Supabase project whenever the
# migrations change on main. A git push does NOT touch the database on its own —
# this workflow runs `supabase db push` for you. It only rolls forward (it never
# resets or drops), and `db push` applies only migrations the remote hasn't seen.
#
# One-time setup (all in a browser):
#   GitHub repo → Settings → Secrets and variables → Actions:
#     - SUPABASE_ACCESS_TOKEN = <dashboard access token>  (Secret) — the SAME one the
#         edge-function deploy already uses; reuse it.
#     - SUPABASE_PROJECT_REF  = <your project ref>        (Variable OR Secret) — same as
#         the edge-function deploy; not sensitive.
#     - SUPABASE_DB_PASSWORD  = <database password>       (Secret) — Project Settings →
#         Database → Connection string / password. Needed to connect to Postgres.
#         This is the one new secret compared to the function deploy.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Read the project ref from a repository Variable or Secret, whichever is set.
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check required config
        run: |
          for v in SUPABASE_PROJECT_REF SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::$v is empty. Add it under Settings → Secrets and variables → Actions."
              exit 1
            fi
          done

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Link uses SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD from the env above,
      # so it is non-interactive.
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      # Applies every migration the remote hasn't run yet.
      - run: supabase db push
