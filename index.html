<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- TODO: the scale lock is a WCAG 1.4.4 failure and should go — but it is
         also what suppresses iOS Safari's zoom-on-input-focus, which fires for
         any input under 16px. CardFilters' search is 14px and its selects are
         12px, so removing the lock without resizing those first trades one
         mobile bug for another. Its own change, tested on a real phone.
         viewport-fit=cover is load-bearing: the safe-area insets in index.css,
         BottomNav and Sheet all read env(safe-area-inset-*), which is 0 without it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b6b3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Super Gol</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
