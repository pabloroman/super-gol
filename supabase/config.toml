project_id = "super-gol"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Set false so local sign-ups log in immediately without email confirmation.
enable_confirmations = false

# Authoritative match resolver. Runs the real basic-game engine (src/game/engine/)
# in Deno and commits the result via the service-role-only record_match function.
[functions.play-match]
verify_jwt = true
