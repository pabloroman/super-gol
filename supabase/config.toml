project_id = "super-gol"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Must match the remote database — check with `SHOW server_version;` there.
major_version = 17

# Seed files, applied IN THIS ORDER after migrations on `db reset` / `start` (never on
# the hosted DB — the GitHub integration deploys migrations only). seed_cards.sql (the
# local catalog + starter flags, generated by `npm run build:cards`) MUST run before
# seed.sql, whose dev-account inserts fire handle_new_user's `where is_starter` grant.
[db.seed]
enabled = true
sql_paths = ["./seed_cards.sql", "./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
# The bare origin covers the `${origin}/` confirmation redirect; the explicit
# /reset-password entry is the password-recovery landing (prod hosts must list
# their own `<origin>/reset-password` in the dashboard's Redirect URLs too).
additional_redirect_urls = ["http://localhost:5173", "http://localhost:5173/reset-password"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Set false so local sign-ups log in immediately without email confirmation.
enable_confirmations = false

# Authoritative match resolver. Runs the real basic-game engine (src/game/engine/)
# in Deno and commits the result via the service-role-only record_match function.
[functions.play-match]
verify_jwt = true

# Admin-only waitlist inviter (0022). Marks selected waitlist rows invited and
# emails them a signup link. verify_jwt rejects anon callers at the edge; the
# function then re-checks profiles.is_admin before writing anything.
[functions.send-invites]
verify_jwt = true
